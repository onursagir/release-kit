name: Release

on:
  push:
    branches: [main]

permissions:
  contents: write
  pull-requests: write
  id-token: write

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          registry-url: https://registry.npmjs.org

      - run: npm ci
      - run: npm run build

      - id: detect
        uses: ./actions/detect

      - name: npm publish
        if: steps.detect.outputs.publish == 'true' && steps.detect.outputs.package != 'actions'
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
        run: |
          npm publish \
            --workspace=@re-kit/${{ steps.detect.outputs.package }} \
            --provenance \
            --access=public

      - name: Tag release
        if: steps.detect.outputs.publish == 'true'
        env:
          GIT_AUTHOR_NAME: re-kit-bot
          GIT_AUTHOR_EMAIL: re-kit-bot@users.noreply.github.com
          GIT_COMMITTER_NAME: re-kit-bot
          GIT_COMMITTER_EMAIL: re-kit-bot@users.noreply.github.com
        run: |
          tag="${{ steps.detect.outputs.package }}-v${{ steps.detect.outputs.version }}"
          git tag "$tag"
          git push origin "$tag"

      - if: steps.detect.outputs.publish != 'true'
        uses: ./actions/version
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          cli-package: ./packages/cli
