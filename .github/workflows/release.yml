name: Release

on:
  push:
    branches: [main]

permissions:
  contents: write
  pull-requests: write
  id-token: write

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          registry-url: https://registry.npmjs.org

      - run: npm ci
      - run: npm run build

      - name: Detect release commit
        id: detect
        shell: bash
        run: |
          msg=$(git log -1 --pretty=%s)
          echo "Last commit subject: $msg"
          if [[ "$msg" =~ ^(Release|Hotfix):\ (.+)@([^@]+)$ ]]; then
            pkg="${BASH_REMATCH[2]}"
            ver="${BASH_REMATCH[3]}"
            echo "publish=true" >> "$GITHUB_OUTPUT"
            echo "package=$pkg" >> "$GITHUB_OUTPUT"
            echo "version=$ver" >> "$GITHUB_OUTPUT"
            echo "Detected release: $pkg@$ver"
          else
            echo "publish=false" >> "$GITHUB_OUTPUT"
          fi

      - name: npm publish
        if: steps.detect.outputs.publish == 'true'
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
        run: |
          npm publish \
            --workspace=@re-kit/${{ steps.detect.outputs.package }} \
            --provenance \
            --access=public

      - name: re-kit version
        if: steps.detect.outputs.publish != 'true'
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          RE_KIT_AUTHOR_NAME: re-kit-bot
          RE_KIT_AUTHOR_EMAIL: re-kit-bot@users.noreply.github.com
        run: node packages/cli/dist/bin.js version
