# Reusable GitHub Actions workflow for re-kit.
#
# Drop this into `.github/workflows/release.yml` of your repo, then:
#   1. Make sure your repo has a `re-kit.config.ts` at the root.
#   2. Add an `NPM_TOKEN` repo secret (only needed if any package is published to npm).
#   3. Allow GitHub Actions to "create and approve pull requests" in repo settings →
#      Actions → General → Workflow permissions.
#
# What this workflow does:
#   * On every push to `main`, runs `re-kit version` via the
#     `onursagir/release-kit/actions/version` composite action. That opens (or
#     updates) one release PR per package with pending intents (isolated mode).
#   * When a release PR merges, the squash-merge commit subject looks like
#     `Release: <package>@<version>`. The `actions/detect` action picks that
#     up and emits `publish`/`package`/`version` outputs you key your publish
#     step off — npm, cargo, helm, whatever your strategy needs.
#
# Caveats:
#   * Mandates squash-merge for release PRs (so the merge commit's subject is
#     the PR title). Configure your repo to enforce that.
#   * The `npm publish` step assumes your package names are `@<scope>/<package>`
#     matching the re-kit `name` field. Tweak as needed for your setup.

name: Release

on:
  push:
    branches: [main]

permissions:
  contents: write
  pull-requests: write
  id-token: write

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          registry-url: https://registry.npmjs.org

      - run: npm ci
      - run: npm run build

      # Pin both actions to the same tag in real usage. `@main` is fine for
      # tracking head, but bumps to the actions can break you on green pushes.
      - id: detect
        uses: onursagir/release-kit/actions/detect@main

      - name: npm publish
        if: steps.detect.outputs.publish == 'true'
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
        run: |
          # Adjust the npm scope to match your packages.
          npm publish \
            --workspace=@your-scope/${{ steps.detect.outputs.package }} \
            --provenance \
            --access=public

      - if: steps.detect.outputs.publish != 'true'
        uses: onursagir/release-kit/actions/version@main
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
